# Author: Fabian Bitter (fabian@bitter.de)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Creates a vault from scratch with real SQLCipher, seeds entries and
  # attachments, then runs the full test suite that reads them back.
  create-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Create fixtures with real SQLCipher
        run: |
          npm install --no-save @journeyapps/sqlcipher
          npm run generate-fixtures
      - name: Run tests
        run: npm test
